<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Vacation Master Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for Vanilla JS -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">

    <div id="app"></div>

    <script>
        // --- CONFIGURATION ---
        const year = 2026;
        
        // Public Holidays in Malta 2026
        const publicHolidays = {
            "2026-01-01": "New Year's Day",
            "2026-02-10": "Feast of St. Paul's Shipwreck",
            "2026-03-19": "Feast of St. Joseph",
            "2026-03-31": "Freedom Day",
            "2026-04-03": "Good Friday",
            "2026-05-01": "Worker's Day",
            "2026-06-07": "Sette Giugno",
            "2026-06-29": "Feast of St. Peter & St. Paul (Mnarja)",
            "2026-08-15": "Feast of the Assumption (Santa Marija)",
            "2026-09-08": "Victory Day",
            "2026-09-21": "Independence Day",
            "2026-12-08": "Immaculate Conception",
            "2026-12-13": "Republic Day",
            "2026-12-25": "Christmas Day",
            "2026-12-26": "Boxing Day (UK/Common)" 
        };

        // Gifted Days (Paid but NOT deducted)
        const giftedLeave = [
            "2026-03-24", // Birthday
            "2026-12-24",
            "2026-12-31"
        ];

        // Rolled Over Leave (From 2025)
        const rolledOverLeave = [
            "2026-01-02"
        ];

        // Confirmed Paternity Leave (10 Business Days)
        const paternityLeave = [
            "2026-02-19", "2026-02-20", 
            "2026-02-23", "2026-02-24", "2026-02-25", "2026-02-26", "2026-02-27",
            "2026-03-02", "2026-03-03", "2026-03-04"
        ];

        // User's Booked Leave (24 Voluntary + 3 Mandatory = 27 Days Total)
        const bookedLeave = [
            "2026-03-20", "2026-03-23", // St Joseph + Bridge to Birthday
            "2026-03-30", "2026-04-01", "2026-04-02", // Easter Bridge
            "2026-05-04", // Worker's Day Bridge
            "2026-06-08", "2026-06-09", // Wife's Birthday
            "2026-06-30", // Mnarja Bridge
            "2026-07-13", "2026-07-14", "2026-07-15", "2026-07-16", "2026-07-17", "2026-07-20", // Friends Trip
            "2026-08-12", "2026-08-13", "2026-08-14", // Santa Marija Heat Escape
            "2026-09-07", // Victory Day Bridge
            "2026-09-22", // Son's Birthday Extension
            "2026-12-07", // Imm Conception Bridge
            "2026-12-21", "2026-12-22", "2026-12-23", // Pre-Christmas Bridge
            "2026-12-28", "2026-12-29", "2026-12-30"  // Mandatory Deducted Days
        ];

        // Specific check for mandatory deducted days
        const mandatoryDeducted = ["2026-12-28", "2026-12-29", "2026-12-30"];

        const months = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        // Helpers
        const getDaysInMonth = (monthIndex, year) => new Date(year, monthIndex + 1, 0).getDate();
        const getFirstDayOfMonth = (monthIndex, year) => new Date(year, monthIndex, 1).getDay();
        const formatDate = (year, month, day) => `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        const getDayStatus = (dateStr, dayOfWeek, monthIndex) => {
            if (dateStr === "2026-03-24") return { type: 'gift', label: 'My Birthday (Free!)' };
            if (dateStr === "2026-06-09") return { type: 'booked', label: "Wife's Birthday" };
            if (dateStr === "2026-09-21") return { type: 'holiday', label: "Son's Birthday (Indep. Day)" };
            if (dateStr === "2026-02-19") return { type: 'paternity', label: "Daughter's Birthday!" };

            if (publicHolidays[dateStr]) return { type: 'holiday', label: publicHolidays[dateStr] };
            if (giftedLeave.includes(dateStr)) return { type: 'gift', label: 'Company Gift (Paid/Free)' };
            if (mandatoryDeducted.includes(dateStr)) return { type: 'mandatory', label: 'Mandatory (Deducted)' };
            if (rolledOverLeave.includes(dateStr)) return { type: 'rolled-over', label: 'Rolled Over (2025)' };
            if (bookedLeave.includes(dateStr)) return { type: 'booked', label: 'Annual Leave' };
            if (paternityLeave.includes(dateStr)) return { type: 'paternity', label: 'Paternity Leave' };
            if (dayOfWeek === 0 || dayOfWeek === 6) return { type: 'weekend', label: 'Weekend' };
            return { type: 'work', label: 'Work Day' };
        };

        const getStatusColor = (type) => {
            switch (type) {
                case 'holiday': return 'bg-red-500 text-white font-bold';
                case 'gift': return 'bg-purple-500 text-white font-bold ring-1 ring-purple-300';
                case 'mandatory': return 'bg-orange-500 text-white font-bold ring-1 ring-orange-300';
                case 'rolled-over': return 'bg-teal-600 text-white font-bold ring-1 ring-teal-300';
                case 'booked': return 'bg-blue-600 text-white font-bold ring-1 ring-blue-300';
                case 'weekend': return 'bg-gray-200 text-gray-400';
                case 'paternity': return 'bg-green-500 text-white font-bold ring-1 ring-green-300';
                default: return 'bg-white text-gray-800';
            }
        };

        // Render Application
        const renderApp = () => {
            let html = `
                <!-- Header Section -->
                <div class="max-w-7xl mx-auto mb-8">
                    <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-600 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                                <i data-lucide="calendar" class="w-8 h-8 text-blue-600"></i>
                                2026 Vacation Master Plan
                            </h1>
                            <p class="text-gray-500 mt-1">27 Days Annual Leave • All Birthdays Maximized • 0 Buffer</p>
                        </div>
                        
                        <div class="flex flex-wrap gap-3 text-sm">
                            <div class="flex items-center gap-2 px-3 py-1 bg-blue-100 text-blue-800 rounded-full">
                                <div class="w-3 h-3 bg-blue-600 rounded-full"></div> Booked (24)
                            </div>
                            <div class="flex items-center gap-2 px-3 py-1 bg-orange-100 text-orange-800 rounded-full">
                                <div class="w-3 h-3 bg-orange-500 rounded-full"></div> Mandatory (3)
                            </div>
                            <div class="flex items-center gap-2 px-3 py-1 bg-purple-100 text-purple-800 rounded-full">
                                <div class="w-3 h-3 bg-purple-500 rounded-full"></div> Gifted (Free)
                            </div>
                            <div class="flex items-center gap-2 px-3 py-1 bg-green-100 text-green-800 rounded-full">
                                <div class="w-3 h-3 bg-green-500 rounded-full"></div> Paternity (10)
                            </div>
                            <div class="flex items-center gap-2 px-3 py-1 bg-teal-100 text-teal-800 rounded-full">
                                <div class="w-3 h-3 bg-teal-600 rounded-full"></div> Rolled Over (2025)
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Calendar Grid -->
                <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            `;

            months.forEach((month, monthIndex) => {
                const daysInMonth = getDaysInMonth(monthIndex, year);
                const firstDay = getFirstDayOfMonth(monthIndex, year);
                
                let monthHtml = `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                        <div class="p-3 text-center font-bold uppercase tracking-wider text-sm ${monthIndex === 1 ? 'bg-green-50 text-green-800' : 'bg-gray-50 text-gray-700'}">
                            ${month}
                        </div>
                        <div class="grid grid-cols-7 gap-1 px-2 pt-2 text-center">
                            <div class="text-[10px] font-medium text-red-300">S</div>
                            <div class="text-[10px] font-medium text-gray-400">M</div>
                            <div class="text-[10px] font-medium text-gray-400">T</div>
                            <div class="text-[10px] font-medium text-gray-400">W</div>
                            <div class="text-[10px] font-medium text-gray-400">T</div>
                            <div class="text-[10px] font-medium text-gray-400">F</div>
                            <div class="text-[10px] font-medium text-red-300">S</div>
                        </div>
                        <div class="grid grid-cols-7 gap-1 p-2 flex-grow content-start">
                `;

                // Empty days
                for (let i = 0; i < firstDay; i++) {
                    monthHtml += `<div class="h-8"></div>`;
                }

                // Actual days
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = formatDate(year, monthIndex, day);
                    const dateObj = new Date(year, monthIndex, day);
                    const dayOfWeek = dateObj.getDay();
                    const status = getDayStatus(dateStr, dayOfWeek, monthIndex);
                    
                    let overlay = '';
                    if (dateStr === "2026-02-19") overlay = `<div class="absolute -top-1 -right-1 text-green-700 bg-white rounded-full p-0.5"><i data-lucide="baby" style="width: 10px; height: 10px;"></i></div>`;
                    if (dateStr === "2026-03-24") overlay = `<div class="absolute -top-1 -right-1 text-purple-700 bg-white rounded-full p-0.5"><i data-lucide="cake" style="width: 10px; height: 10px;"></i></div>`;
                    if (dateStr === "2026-06-09") overlay = `<div class="absolute -top-1 -right-1 text-red-500 bg-white rounded-full p-0.5"><i data-lucide="heart" style="width: 10px; height: 10px;"></i></div>`;
                    if (dateStr === "2026-09-21") overlay = `<div class="absolute -top-1 -right-1 text-orange-600 bg-white rounded-full p-0.5"><i data-lucide="party-popper" style="width: 10px; height: 10px;"></i></div>`;

                    const isHighlight = status.type === 'booked' || status.type === 'mandatory' || status.type === 'paternity' || status.type === 'rolled-over';
                    
                    monthHtml += `
                        <div title="${month} ${day}: ${status.label}"
                             class="relative h-8 flex items-center justify-center text-xs rounded-md cursor-default transition-colors ${getStatusColor(status.type)} ${isHighlight ? 'scale-110 shadow-md z-10' : ''}">
                            ${day}
                            ${overlay}
                        </div>
                    `;
                }

                monthHtml += `</div>`; // Close days grid

                // Monthly Notes
                let note = null;
                let iconName = null;
                if (monthIndex === 0) { note = "Used 2025 Rollover (Jan 2)"; iconName = "history"; }
                if (monthIndex === 1) { note = "Daughter Born Feb 19! (Paternity)"; iconName = "baby"; }
                if (monthIndex === 2) { note = "Return Mar 5 + Bday Run (6 Days)"; iconName = "cake"; } 
                if (monthIndex === 3) { note = "Easter Break (9 Days)"; iconName = "sun"; }
                if (monthIndex === 4) { note = "Worker's Day Bridge (4 Days)"; iconName = "sun"; }
                if (monthIndex === 5) { note = "Wife's Bday (4d) + Mnarja (4d)"; iconName = "heart"; }
                if (monthIndex === 6) { note = "Friends Visiting (10 Days)"; iconName = "plane"; }
                if (monthIndex === 7) { note = "Santa Marija Heat Escape (5 Days)"; iconName = "anchor"; }
                if (monthIndex === 8) { note = "Son's Bday Extended (4 Days)"; iconName = "party-popper"; } 
                if (monthIndex === 11) { note = "Xmas Shutdown (16 Days!)"; iconName = "gift"; }

                if (note) {
                    const noteClass = monthIndex === 1 ? 'bg-green-50 text-green-700' : 'bg-blue-50 text-blue-700';
                    monthHtml += `
                        <div class="p-2 text-xs text-center border-t border-gray-100 flex items-center justify-center gap-2 ${noteClass}">
                            <i data-lucide="${iconName}" class="w-3 h-3"></i>
                            ${note}
                        </div>
                    `;
                }

                monthHtml += `</div>`; // Close month card
                html += monthHtml;
            });

            html += `
                </div>
            `;

            document.getElementById('app').innerHTML = html;
            
            // Initialize Lucide icons
            lucide.createIcons();
        };

        // Run the render function on load
        renderApp();
    </script>
</body>
</html>
